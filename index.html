<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>yuancaoyaohw.github.io</title>
    <meta name="description" content="yuancaoyaohw 的 GitHub Pages 主页">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f8fb;
        --text: #172033;
        --muted: #5c667a;
        --panel: #ffffff;
        --border: #d8dee9;
        --accent: #2457d6;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --text: #eef2ff;
          --muted: #a8b3cf;
          --panel: #182235;
          --border: #2c3954;
          --accent: #8fb3ff;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1.08;
      }

      p {
        margin: 0;
      }

      .intro {
        max-width: 760px;
        color: var(--muted);
        font-size: 18px;
      }

      .project {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
        gap: 28px;
        align-items: center;
        margin-top: 44px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      .project h2 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      .project p {
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a.button {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 10px 16px;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      a.text-link {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      .preview {
        width: 100%;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
      }

      .preview img {
        display: block;
        width: 100%;
        height: auto;
      }

      @media (max-width: 760px) {
        main {
          padding: 36px 0;
        }

        .project {
          grid-template-columns: 1fr;
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>yuancaoyaohw.github.io</h1>
      <p class="intro">这里收纳我整理和翻译的技术资料。当前入口是《Modern GPU Programming For MLSys》中文翻译。</p>

      <section class="project" aria-labelledby="gpu-book-title">
        <div>
          <h2 id="gpu-book-title">Modern GPU Programming For MLSys</h2>
          <p>面向机器学习系统的现代 GPU 编程中文翻译，包含章节正文、交互式示例和参考资料。</p>
          <div class="actions">
            <a class="button" href="modern-gpu-programming-for-mlsys/">打开书籍</a>
            <a class="text-link" href="modern-gpu-programming-for-mlsys/chapter_background/">从第一章开始</a>
          </div>
        </div>
        <div class="preview" aria-hidden="true">
          <img src="modern-gpu-programming-for-mlsys/img/roofline.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
